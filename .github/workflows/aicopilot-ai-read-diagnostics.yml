name: aicopilot-ai-read-diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: [self-hosted, iiot-linux-prod]
    environment: production
    timeout-minutes: 10

    steps:
      - name: Inspect server Cloud AiRead state
        shell: bash
        env:
          DEPLOY_TARGET_DIR: ${{ secrets.DEPLOY_TARGET_DIR }}
        run: |
          set -euo pipefail

          if [ "$(id -u)" -eq 0 ]; then
            echo "Self-hosted runner must not run as root." >&2
            exit 64
          fi

          command -v docker >/dev/null
          command -v curl >/dev/null
          docker compose version >/dev/null

          deploy_dir="${DEPLOY_TARGET_DIR:-/srv/enterprise-ai/deploy}"
          env_file="$deploy_dir/.env"
          compose_file="$deploy_dir/docker-compose.yaml"

          if [ ! -d "$deploy_dir" ]; then
            echo "Missing deploy directory: $deploy_dir" >&2
            exit 66
          fi

          if [ ! -f "$env_file" ]; then
            echo "Missing deploy environment file: $env_file" >&2
            exit 66
          fi

          if [ ! -f "$compose_file" ]; then
            echo "Missing compose file: $compose_file" >&2
            exit 66
          fi

          runner_attestation="$deploy_dir/scripts/check-runner-security-attestation.sh"
          if [ ! -x "$runner_attestation" ]; then
            echo "Missing runner security attestation script: $runner_attestation" >&2
            exit 66
          fi
          "$runner_attestation" --deploy-dir "$deploy_dir"

          read_env_value() {
            local key="$1"
            awk -v key="$key" '
              BEGIN { prefix = key "=" }
              index($0, prefix) == 1 {
                value = substr($0, length(prefix) + 1)
                sub(/\r$/, "", value)
                print value
                exit
              }
            ' "$env_file"
          }

          emit_line() {
            printf '%s\n' "$1"
            printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }

          emit_heading() {
            printf '\n### %s\n\n' "$1" >> "$GITHUB_STEP_SUMMARY"
            printf '\n%s\n' "$1"
          }

          readonly_mode="$(read_env_value CLOUD_READONLY_MODE)"
          readonly_real_enabled="$(read_env_value CLOUD_READONLY_REAL_ENABLED)"
          readonly_real_allowed="$(read_env_value CLOUD_READONLY_REAL_ALLOW_PRODUCTION_READ)"
          ai_read_enabled="$(read_env_value CLOUD_AI_READ_ENABLED)"
          ai_read_base_url="$(read_env_value CLOUD_AI_READ_BASE_URL)"
          ai_read_token="$(read_env_value CLOUD_AI_SERVICE_ACCOUNT_TOKEN)"
          token_configured="no"
          token_shape="empty"

          if [ -n "$ai_read_token" ]; then
            token_configured="yes"
            case "$ai_read_token" in
              eyJ*.*.*)
                token_shape="jwt-like"
                ;;
              *)
                token_shape="non-jwt-like"
                ;;
            esac
          fi

          {
            echo "# AICopilot Cloud AiRead diagnostics"
            echo ""
            echo "- Deploy directory: \`$deploy_dir\`"
            echo "- Compose file: \`$compose_file\`"
          } >> "$GITHUB_STEP_SUMMARY"

          emit_heading "Server .env state"
          emit_line "- CLOUD_READONLY_MODE=${readonly_mode:-<unset>}"
          emit_line "- CLOUD_READONLY_REAL_ENABLED=${readonly_real_enabled:-<unset>}"
          emit_line "- CLOUD_READONLY_REAL_ALLOW_PRODUCTION_READ=${readonly_real_allowed:-<unset>}"
          emit_line "- CLOUD_AI_READ_ENABLED=${ai_read_enabled:-<unset>}"
          emit_line "- CLOUD_AI_READ_BASE_URL=${ai_read_base_url:-<unset>}"
          emit_line "- CLOUD_AI_SERVICE_ACCOUNT_TOKEN_CONFIGURED=$token_configured"
          emit_line "- CLOUD_AI_SERVICE_ACCOUNT_TOKEN_SHAPE=$token_shape"

          emit_heading "Container environment state"
          cd "$deploy_dir"
          docker compose --env-file "$env_file" -f "$compose_file" ps
          docker compose --env-file "$env_file" -f "$compose_file" exec -T aicopilot-httpapi sh -lc '
            printf "ASPNETCORE_ENVIRONMENT=%s\n" "${ASPNETCORE_ENVIRONMENT:-}"
            printf "CloudReadonly__Mode=%s\n" "${CloudReadonly__Mode:-}"
            printf "CloudReadonly__Real__Enabled=%s\n" "${CloudReadonly__Real__Enabled:-}"
            printf "CloudReadonly__Real__AllowProductionRead=%s\n" "${CloudReadonly__Real__AllowProductionRead:-}"
            printf "CloudAiRead__Enabled=%s\n" "${CloudAiRead__Enabled:-}"
            printf "CloudAiRead__BaseUrl=%s\n" "${CloudAiRead__BaseUrl:-}"
            if [ -n "${CloudAiRead__ServiceAccountToken:-}" ]; then
              printf "CloudAiRead__ServiceAccountToken_CONFIGURED=yes\n"
            else
              printf "CloudAiRead__ServiceAccountToken_CONFIGURED=no\n"
            fi
          ' | tee -a "$GITHUB_STEP_SUMMARY"

          emit_heading "Cloud AiRead endpoint probe"
          if [ -z "$ai_read_token" ]; then
            emit_line "- Probe skipped: CLOUD_AI_SERVICE_ACCOUNT_TOKEN is not configured."
            emit_line "- Diagnosis: token_missing"
            exit 0
          fi

          if [ -z "$ai_read_base_url" ]; then
            emit_line "- Probe failed: CLOUD_AI_READ_BASE_URL is not configured."
            emit_line "- Diagnosis: base_url_missing"
            exit 64
          fi

          body_file="$(mktemp "${RUNNER_TEMP:-/tmp}/ai-read-devices.XXXXXX")"
          trap 'rm -f "$body_file"' EXIT
          probe_url="${ai_read_base_url%/}/api/v1/ai/read/devices?maxRows=5"
          status_code="$(curl -sS --max-time 15 -o "$body_file" -w "%{http_code}" \
            -H "Authorization: Bearer $ai_read_token" \
            "$probe_url" || true)"

          emit_line "- Probe URL: ${probe_url}"
          emit_line "- HTTP status: ${status_code:-curl_error}"

          case "${status_code:-}" in
            200)
              emit_line "- Diagnosis: ai_read_ready"
              ;;
            401)
              emit_line "- Diagnosis: token_invalid_or_expired"
              ;;
            403)
              emit_line "- Diagnosis: token_missing_permission_or_scope"
              ;;
            000|"")
              emit_line "- Diagnosis: cloud_endpoint_unreachable"
              ;;
            *)
              emit_line "- Diagnosis: unexpected_status"
              ;;
          esac

          {
            echo ""
            echo "Response preview:"
            echo '```json'
            head -c 500 "$body_file" || true
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
