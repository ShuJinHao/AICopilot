name: aicopilot-ci

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

env:
  QUALITY_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.301"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "src/vues/AICopilot.Web/package-lock.json"

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Restore AICopilot solution
        run: dotnet restore AICopilot.slnx

      - name: Restore web dependencies
        working-directory: src/vues/AICopilot.Web
        run: npm ci

      - name: Enforce incremental deployment policy
        shell: pwsh
        run: ./deploy/enterprise-ai/tests/TestDeploymentPolicy.ps1

      - name: Require Linux Docker runtime
        run: docker info

      - name: Build AICopilot solution
        run: dotnet build AICopilot.slnx -c Release --no-restore

      - name: Test inventory and reconciliation behavior
        shell: pwsh
        run: ./scripts/tests/Test-AICopilotTestInfrastructureBehavior.ps1

      - name: Enforce compatibility and duplication ratchets
        shell: pwsh
        run: |
          ./scripts/tests/Test-AICopilotTestDeclarationTransition.ps1
          ./scripts/tests/Test-AICopilotCompatibilityInventory.ps1 -BaseRef "$env:QUALITY_BASE_SHA"
          ./scripts/tests/Measure-AICopilotDuplication.ps1 -BaseRef "$env:QUALITY_BASE_SHA"

      - name: Discover required AICopilot test runners
        shell: pwsh
        run: ./scripts/tests/Get-AICopilotTestInventory.ps1 -BaseRef "$env:QUALITY_BASE_SHA" -OutputPath artifacts/test-inventory.json

      - name: Run required no-external .NET tests in parallel and resource tests serially
        shell: pwsh
        run: |
          $inventory = Get-Content artifacts/test-inventory.json -Raw | ConvertFrom-Json
          $required = @($inventory.projects | Where-Object { $_.role -eq 'Runner' -and [bool]$_.required })
          $noExternal = @($required | Where-Object { $_.runtime -in @('Pure', 'InProcess') })
          $resource = @($required | Where-Object { $_.runtime -notin @('Pure', 'InProcess') })
          $noExternal | ForEach-Object -Parallel {
            $project = $_
            $runnerResults = "artifacts/test-results/$($project.projectName)"
            & dotnet test $project.path -c Release --no-build --no-restore --collect "XPlat Code Coverage" --logger "trx;LogFileName=$($project.projectName).trx" --results-directory $runnerResults
            if ($LASTEXITCODE -ne 0) {
              throw "Required no-external test runner failed: $($project.path)"
            }
          } -ThrottleLimit 4
          foreach ($project in $resource) {
            $runnerResults = "artifacts/test-results/$($project.projectName)"
            & dotnet test $project.path -c Release --no-build --no-restore --collect "XPlat Code Coverage" --logger "trx;LogFileName=$($project.projectName).trx" --results-directory $runnerResults
            if ($LASTEXITCODE -ne 0) {
              throw "Required resource test runner failed: $($project.path)"
            }
          }

      - name: Reconcile all required production coverage
        shell: pwsh
        run: ./scripts/tests/Confirm-AICopilotCoverage.ps1 -BaseRef "$env:QUALITY_BASE_SHA"

      - name: Run deployment behavior tests
        shell: bash
        run: |
          set -euo pipefail
          bash deploy/enterprise-ai/tests/deployment-behavior.sh 2>&1 | tee artifacts/test-results/deployment-behavior.log

      - name: Install Playwright Chromium
        working-directory: src/vues/AICopilot.Web
        run: npx playwright install --with-deps chromium

      - name: Test and build web app
        working-directory: src/vues/AICopilot.Web
        env:
          PLAYWRIGHT_CHANNEL: chromium
          PLAYWRIGHT_JSON_OUTPUT_NAME: ../../../artifacts/test-results/playwright.json
        run: |
          npm run lint:check
          npm run test:unit -- --reporter=json --outputFile=../../../artifacts/test-results/vitest.json
          npm run test:smoke -- --reporter=json
          npm run build

      - name: Reconcile required test results
        shell: pwsh
        run: ./scripts/tests/Confirm-AICopilotRequiredTestResults.ps1 -InventoryPath artifacts/test-inventory.json -ResultsDirectory artifacts/test-results -VitestPath artifacts/test-results/vitest.json -PlaywrightPath artifacts/test-results/playwright.json -DeploymentPath artifacts/test-results/deployment-behavior.log -ExpectedVitestCount 165 -ExpectedPlaywrightCount 43 -ExpectedDeploymentCount 33

      - name: Upload required test evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-required-test-results
          path: |
            artifacts/test-inventory.json
            artifacts/quality/**
            artifacts/test-results/**
          if-no-files-found: warn

  mutation-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.301"

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Enforce AI-SEC-011/012 mutation quality against event quality base
        shell: pwsh
        run: ./scripts/tests/Invoke-AICopilotMutation.ps1 -BaseRef "$env:QUALITY_BASE_SHA"

      - name: Upload mutation evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-mutation-report
          path: |
            artifacts/mutation/**
            artifacts/quality/aicopilot-mutation.json
          if-no-files-found: error
