name: aicopilot-ci

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

env:
  QUALITY_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

jobs:
  governance_gates:
    name: governance-gates
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.301"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "src/vues/AICopilot.Web/package-lock.json"

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Restore governance TypeScript dependencies
        working-directory: src/vues/AICopilot.Web
        run: npm ci

      - name: Test inventory and reconciliation behavior
        shell: pwsh
        run: ./scripts/tests/Test-AICopilotTestInfrastructureBehavior.ps1

      - name: Enforce compatibility and duplication ratchets
        shell: pwsh
        run: |
          ./scripts/tests/Test-AICopilotTestDeclarationTransition.ps1
          ./scripts/tests/Test-AICopilotCompatibilityInventory.ps1 -BaseRef "$env:QUALITY_BASE_SHA"
          ./scripts/tests/Measure-AICopilotDuplication.ps1 -BaseRef "$env:QUALITY_BASE_SHA"

      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-required-governance
          path: artifacts/
          if-no-files-found: error
          retention-days: 1

  dotnet_tests:
    name: dotnet-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.301"

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Restore AICopilot solution
        run: dotnet restore AICopilot.slnx

      - name: Require Linux Docker runtime
        run: docker info

      - name: Build AICopilot solution
        shell: pwsh
        run: |
          $head = ((& git rev-parse HEAD) -join "`n").Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $head -notmatch '^[0-9a-f]{40}$') {
            throw "Canonical build HEAD is not a full Git commit: $head"
          }
          & dotnet build AICopilot.slnx -c Release --no-restore "-p:SourceRevisionId=$head"
          if ($LASTEXITCODE -ne 0) {
            throw "Canonical AICopilot solution build failed with exit code $LASTEXITCODE."
          }

      - name: Discover required AICopilot test runners
        shell: pwsh
        run: ./scripts/tests/Get-AICopilotTestInventory.ps1 -BaseRef "$env:QUALITY_BASE_SHA" -OutputPath artifacts/test-inventory.json -SynchronizeRunnerBuildIdentity

      - name: Run required no-external .NET tests in parallel and resource tests serially
        shell: pwsh
        run: |
          $inventory = Get-Content artifacts/test-inventory.json -Raw | ConvertFrom-Json
          $required = @($inventory.projects | Where-Object { $_.role -eq 'Runner' -and [bool]$_.required })
          $noExternal = @($required | Where-Object { $_.runtime -in @('Pure', 'InProcess') })
          $resource = @($required | Where-Object { $_.runtime -notin @('Pure', 'InProcess') })
          $repositoryRoot = (Get-Location).Path
          $bindingScript = Join-Path $repositoryRoot 'scripts/tests/Bind-AICopilotRunnerBuildIdentity.ps1'
          $noExternal | ForEach-Object -Parallel {
            $project = $_
            $runnerResults = "artifacts/test-results/$($project.projectName)"
            $runnerInput = "artifacts/runner-inputs/$($project.projectName).json"
            & pwsh -NoProfile -File $using:bindingScript -RepositoryRoot $using:repositoryRoot -InventoryPath artifacts/test-inventory.json -ProjectName $project.projectName -OutputPath $runnerInput -SynchronizeRunnerBuildIdentity
            if ($LASTEXITCODE -ne 0) {
              throw "Required no-external runner input binding failed: $($project.path)"
            }
            & dotnet test $project.path -c Release --no-build --no-restore --collect "XPlat Code Coverage" --logger "trx;LogFileName=$($project.projectName).trx" --results-directory $runnerResults
            if ($LASTEXITCODE -ne 0) {
              throw "Required no-external test runner failed: $($project.path)"
            }
          } -ThrottleLimit 4
          foreach ($project in $resource) {
            $runnerResults = "artifacts/test-results/$($project.projectName)"
            $runnerInput = "artifacts/runner-inputs/$($project.projectName).json"
            & pwsh -NoProfile -File $bindingScript -RepositoryRoot $repositoryRoot -InventoryPath artifacts/test-inventory.json -ProjectName $project.projectName -OutputPath $runnerInput -SynchronizeRunnerBuildIdentity
            if ($LASTEXITCODE -ne 0) {
              throw "Required resource runner input binding failed: $($project.path)"
            }
            & dotnet test $project.path -c Release --no-build --no-restore --collect "XPlat Code Coverage" --logger "trx;LogFileName=$($project.projectName).trx" --results-directory $runnerResults
            if ($LASTEXITCODE -ne 0) {
              throw "Required resource test runner failed: $($project.path)"
            }
          }

      - name: Reconcile all required production coverage
        shell: pwsh
        run: ./scripts/tests/Confirm-AICopilotCoverage.ps1 -BaseRef "$env:QUALITY_BASE_SHA"

      - name: Upload .NET test evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-required-dotnet
          path: artifacts/
          if-no-files-found: error
          retention-days: 1

  web_deployment_tests:
    name: web-deployment-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "src/vues/AICopilot.Web/package-lock.json"

      - name: Restore web dependencies
        working-directory: src/vues/AICopilot.Web
        run: npm ci

      - name: Enforce incremental deployment policy
        shell: pwsh
        run: ./deploy/enterprise-ai/tests/TestDeploymentPolicy.ps1

      - name: Run deployment behavior tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/test-results
          bash deploy/enterprise-ai/tests/deployment-behavior.sh 2>&1 | tee artifacts/test-results/deployment-behavior.log

      - name: Install Playwright Chromium
        working-directory: src/vues/AICopilot.Web
        run: npx playwright install --with-deps chromium

      - name: Test and build web app
        working-directory: src/vues/AICopilot.Web
        env:
          PLAYWRIGHT_CHANNEL: chromium
          PLAYWRIGHT_JSON_OUTPUT_NAME: ../../../artifacts/test-results/playwright.json
        run: |
          npm run lint:check
          npm run test:unit -- --reporter=json --outputFile=../../../artifacts/test-results/vitest.json
          npm run test:smoke -- --reporter=json
          npm run build

      - name: Upload Web and deployment evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-required-web-deployment
          path: artifacts/
          if-no-files-found: error
          retention-days: 1

  mutation_gate:
    name: mutation-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.301"

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Enforce AI-SEC-011/012 mutation quality against event quality base
        shell: pwsh
        run: ./scripts/tests/Invoke-AICopilotMutation.ps1 -BaseRef "$env:QUALITY_BASE_SHA"

      - name: Upload mutation evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-mutation-report
          path: |
            artifacts/mutation/**
            artifacts/quality/aicopilot-mutation.json
          if-no-files-found: error

  build-test:
    needs: [governance_gates, dotnet_tests, web_deployment_tests, mutation_gate]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Verify required lane conclusions
        shell: pwsh
        env:
          GOVERNANCE_RESULT: ${{ needs.governance_gates.result }}
          DOTNET_RESULT: ${{ needs.dotnet_tests.result }}
          WEB_DEPLOYMENT_RESULT: ${{ needs.web_deployment_tests.result }}
          MUTATION_RESULT: ${{ needs.mutation_gate.result }}
        run: |
          $results = [ordered]@{
            governance = $env:GOVERNANCE_RESULT
            dotnet = $env:DOTNET_RESULT
            webDeployment = $env:WEB_DEPLOYMENT_RESULT
            mutation = $env:MUTATION_RESULT
          }
          $failures = @($results.GetEnumerator() | Where-Object { $_.Value -ne 'success' })
          if ($failures.Count -ne 0) {
            $summary = ($failures | ForEach-Object { "$($_.Key)=$($_.Value)" }) -join '; '
            throw "Required CI lane failure: $summary"
          }

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download required lane evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: aicopilot-required-*
          path: artifacts
          merge-multiple: true

      - name: Download mutation evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: aicopilot-mutation-report
          path: artifacts

      - name: Reconcile required test results
        shell: pwsh
        run: ./scripts/tests/Confirm-AICopilotRequiredTestResults.ps1 -InventoryPath artifacts/test-inventory.json -ResultsDirectory artifacts/test-results -VitestPath artifacts/test-results/vitest.json -PlaywrightPath artifacts/test-results/playwright.json -DeploymentPath artifacts/test-results/deployment-behavior.log -ExpectedVitestCount 168 -ExpectedPlaywrightCount 43 -ExpectedDeploymentCount 33

      - name: Upload required test evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-required-test-results
          path: artifacts/
          if-no-files-found: warn
