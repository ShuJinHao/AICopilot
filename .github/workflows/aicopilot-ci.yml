name: aicopilot-ci

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch:
    inputs:
      mode:
        description: "default=Architecture/Security + affected Business; heavy lanes require an explicit mode"
        required: true
        type: choice
        default: default
        options:
          - default
          - quality
          - cross-project
          - full
      cloud_ref:
        description: "Cloud ref used only by cross-project mode"
        required: false
        type: string
        default: main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  CI_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'default' }}
  QUALITY_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

jobs:
  build-test:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode != 'cross-project' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Select current scope and validate selector only when affected
        id: select
        shell: pwsh
        run: |
          $baseRef = $env:QUALITY_BASE_SHA
          if ([string]::IsNullOrWhiteSpace($baseRef)) {
            $baseRef = 'HEAD^'
          }
          $selectorInputs = @(
            & git diff --name-only $baseRef HEAD -- `
              '.github/workflows/aicopilot-ci.yml' `
              'scripts/tests/Select-AICopilotCiTests.ps1' `
              'scripts/tests/Invoke-AICopilotCiSelectedTests.ps1' `
              'scripts/tests/Test-AICopilotCiTestSelection.ps1'
          )
          if ($LASTEXITCODE -ne 0) {
            throw 'Unable to determine whether the AICopilot CI selector changed.'
          }
          if ($selectorInputs.Count -gt 0) {
            ./scripts/tests/Test-AICopilotCiTestSelection.ps1
          } else {
            Write-Host 'AICopilot CI selector behavior test skipped because selector inputs are unaffected.'
          }
          ./scripts/tests/Select-AICopilotCiTests.ps1 `
            -Mode $env:CI_MODE `
            -BaseRef $baseRef `
            -HeadRef HEAD `
            -OutputPath artifacts/ci-selection.json

      - name: Require container runtime only when selected tests need it
        if: ${{ steps.select.outputs.requires_docker == 'true' }}
        run: docker info

      - name: Restore selected .NET test projects
        shell: pwsh
        run: |
          $selection = Get-Content artifacts/ci-selection.json -Raw | ConvertFrom-Json
          foreach ($project in @($selection.selectedDotNetProjects)) {
            & dotnet restore $project.path
            if ($LASTEXITCODE -ne 0) {
              throw "Restore failed for selected project: $($project.path)"
            }
          }

      - name: Run selected .NET tests and record current discovery
        shell: pwsh
        run: |
          $parameters = @{
            SelectionPath = 'artifacts/ci-selection.json'
            ResultsDirectory = 'artifacts/ci-test-results'
            Configuration = 'Release'
          }
          if ($env:CI_MODE -in @('quality', 'full')) {
            $parameters.CollectCoverage = $true
          }
          ./scripts/tests/Invoke-AICopilotCiSelectedTests.ps1 @parameters

      - name: Setup Node
        if: ${{ steps.select.outputs.web_affected == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'quality' || inputs.mode == 'full')) }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "src/vues/AICopilot.Web/package-lock.json"

      - name: Restore web dependencies
        if: ${{ steps.select.outputs.web_affected == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'quality' || inputs.mode == 'full')) }}
        working-directory: src/vues/AICopilot.Web
        run: npm ci

      - name: Lint, type-check, build and test affected web scope
        if: ${{ steps.select.outputs.web_affected == 'true' }}
        shell: pwsh
        working-directory: src/vues/AICopilot.Web
        run: |
          npm run lint:check
          if ($LASTEXITCODE -ne 0) { throw 'AICopilot Web lint failed.' }
          npm run type-check
          if ($LASTEXITCODE -ne 0) { throw 'AICopilot Web type-check failed.' }
          npm run build-only
          if ($LASTEXITCODE -ne 0) { throw 'AICopilot Web build failed.' }
          $selection = Get-Content ../../../artifacts/ci-selection.json -Raw | ConvertFrom-Json
          if ([bool]$selection.web.full) {
            npm run test:unit
          } else {
            $files = @($selection.web.changedFiles | ForEach-Object {
                ([string]$_).Substring('src/vues/AICopilot.Web/'.Length)
              })
            if ($files.Count -gt 0) {
              npx vitest related @files --run --config vitest.config.ts --passWithNoTests
            }
          }
          if ($LASTEXITCODE -ne 0) { throw 'AICopilot Web selected tests failed.' }

      - name: Run deployment policy and behavior only when affected
        if: ${{ steps.select.outputs.deployment_affected == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci-test-results
          pwsh -NoProfile -File deploy/enterprise-ai/tests/TestDeploymentPolicy.ps1
          bash deploy/enterprise-ai/tests/deployment-behavior.sh 2>&1 | tee artifacts/ci-test-results/deployment-behavior.log

      - name: Run explicit quality gates
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode == 'quality' || inputs.mode == 'full') }}
        shell: pwsh
        run: |
          $baseRef = if ([string]::IsNullOrWhiteSpace($env:QUALITY_BASE_SHA)) { 'HEAD^' } else { $env:QUALITY_BASE_SHA }
          ./scripts/tests/Test-AICopilotCompatibilityInventory.ps1 -BaseRef $baseRef
          ./scripts/tests/Measure-AICopilotDuplication.ps1 -BaseRef $baseRef
          ./scripts/tests/Invoke-AICopilotMutation.ps1 -BaseRef $baseRef

      - name: Run full browser smoke only in explicit full mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        working-directory: src/vues/AICopilot.Web
        env:
          PLAYWRIGHT_CHANNEL: chromium
        run: |
          npx playwright install --with-deps chromium
          npm run test:smoke

      - name: Upload selected test evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-ci-${{ env.CI_MODE }}-evidence
          path: |
            artifacts/ci-selection.json
            artifacts/ci-test-results/**
            artifacts/mutation/**
            artifacts/quality/**
          if-no-files-found: warn
          retention-days: 14

  cross-project:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'cross-project' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout AICopilot candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          path: AICopilot

      - name: Checkout Cloud candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ShuJinHao/IIoT.CloudPlatform
          ref: ${{ inputs.cloud_ref }}
          fetch-depth: 0
          persist-credentials: false
          path: IIoT.CloudPlatform

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: IIoT.CloudPlatform/global.json

      - name: Require container runtime
        run: docker info

      - name: Select and restore Cloud/AICopilot workspace runner
        shell: pwsh
        working-directory: IIoT.CloudPlatform
        run: |
          ./scripts/tests/Select-CloudCiTests.ps1 `
            -Mode CrossProject `
            -ChangedFiles @() `
            -OutputPath artifacts/ci-selection.json `
            -GitHubOutputPath ''
          $selection = Get-Content artifacts/ci-selection.json -Raw | ConvertFrom-Json
          foreach ($project in @($selection.selectedDotNetProjects)) {
            & dotnet restore $project.path --disable-build-servers --nologo -noAutoResponse
            if ($LASTEXITCODE -ne 0) {
              throw "Restore failed for cross-project runner: $($project.path)"
            }
          }

      - name: Run Cloud/AICopilot workspace alignment
        shell: pwsh
        working-directory: IIoT.CloudPlatform
        env:
          AICOPILOT_REPOSITORY_ROOT: ${{ github.workspace }}/AICopilot
        run: ./scripts/tests/Invoke-CloudCiSelectedTests.ps1 -SelectionPath artifacts/ci-selection.json -ResultsDirectory artifacts/ci-test-results -Configuration Release

      - name: Upload cross-project evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-cloud-cross-project-evidence
          path: |
            IIoT.CloudPlatform/artifacts/ci-selection.json
            IIoT.CloudPlatform/artifacts/ci-test-results/**
          if-no-files-found: warn
          retention-days: 14
