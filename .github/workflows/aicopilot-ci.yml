name: aicopilot-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "deploy/**"
      - "docs/**"
      - "scripts/**"
      - ".dockerignore"
      - ".gitattributes"
      - "AGENTS.md"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "global.json"
      - "AICopilot.slnx"
      - ".github/workflows/**"
  pull_request: {}

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.301"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "src/vues/AICopilot.Web/package-lock.json"

      - name: Verify .NET SDK
        run: test "$(dotnet --version)" = "10.0.301"

      - name: Restore AICopilot solution
        run: dotnet restore AICopilot.slnx

      - name: Restore web dependencies
        working-directory: src/vues/AICopilot.Web
        run: npm ci

      - name: Enforce incremental deployment policy
        shell: pwsh
        run: ./deploy/enterprise-ai/tests/TestDeploymentPolicy.ps1

      - name: Require Linux Docker runtime
        run: docker info

      - name: Build AICopilot solution
        run: dotnet build AICopilot.slnx -c Release --no-restore

      - name: Test inventory and reconciliation behavior
        shell: pwsh
        run: ./scripts/tests/Test-AICopilotTestInfrastructureBehavior.ps1

      - name: Discover required AICopilot test runners
        shell: pwsh
        run: ./scripts/tests/Get-AICopilotTestInventory.ps1 -OutputPath artifacts/test-inventory.json

      - name: Run dynamically discovered required .NET tests
        shell: pwsh
        run: |
          $inventory = Get-Content artifacts/test-inventory.json -Raw | ConvertFrom-Json
          foreach ($project in @($inventory.projects | Where-Object { $_.role -eq 'Runner' -and [bool]$_.required })) {
            & dotnet test $project.path -c Release --no-build --no-restore --logger "trx;LogFileName=$($project.projectName).trx" --results-directory artifacts/test-results
            if ($LASTEXITCODE -ne 0) {
              throw "Required test runner failed: $($project.path)"
            }
          }

      - name: Run deployment behavior tests
        shell: bash
        run: |
          set -euo pipefail
          bash deploy/enterprise-ai/tests/deployment-behavior.sh 2>&1 | tee artifacts/test-results/deployment-behavior.log

      - name: Test and build web app
        working-directory: src/vues/AICopilot.Web
        run: |
          npm run test:unit -- --reporter=json --outputFile=../../../artifacts/test-results/vitest.json
          npm run build

      - name: Reconcile required test results
        shell: pwsh
        run: ./scripts/tests/Confirm-AICopilotRequiredTestResults.ps1 -InventoryPath artifacts/test-inventory.json -ResultsDirectory artifacts/test-results -VitestPath artifacts/test-results/vitest.json -DeploymentPath artifacts/test-results/deployment-behavior.log

      - name: Upload required test evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-required-test-results
          path: |
            artifacts/test-inventory.json
            artifacts/test-results/**
          if-no-files-found: warn
