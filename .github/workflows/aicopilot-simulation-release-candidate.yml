name: AICopilot Manual Simulation Release Candidate

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Optional base branch for a manual comparison; defaults to the repository default branch.
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  simulation-manual:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Enforce incremental deployment policy
        shell: pwsh
        run: ./deploy/enterprise-ai/tests/TestDeploymentPolicy.ps1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/vues/AICopilot.Web/package-lock.json

      - name: Restore frontend dependencies
        working-directory: src/vues/AICopilot.Web
        run: npm ci

      - name: Frontend smoke tests
        working-directory: src/vues/AICopilot.Web
        run: npm run test:smoke

      - name: Frontend vulnerability scan
        working-directory: src/vues/AICopilot.Web
        run: npm audit --audit-level=high

      - name: Require Linux Docker runtime
        run: docker info

      - name: Full deterministic Simulation acceptance
        shell: pwsh
        run: ./scripts/Run-AgentSimulationAcceptance.ps1 -Configuration Release

      - name: Upload Simulation acceptance evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: aicopilot-simulation-acceptance-${{ github.run_id }}
          path: |
            artifacts/simulation/agent-simulation-acceptance.md
            artifacts/simulation/simulation-test-summary.json
            artifacts/simulation/test-results/*.trx
          if-no-files-found: warn
          retention-days: 14

      - name: Resolve comparison base
        id: comparison
        shell: pwsh
        env:
          DISPATCH_BASE_REF: ${{ inputs.base_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          $ErrorActionPreference = 'Stop'

          $baseRef = if ([string]::IsNullOrWhiteSpace($env:DISPATCH_BASE_REF)) {
            $env:DEFAULT_BRANCH
          }
          else {
            $env:DISPATCH_BASE_REF.Trim()
          }

          if ([string]::IsNullOrWhiteSpace($baseRef) -or
              $baseRef.Length -gt 255 -or
              $baseRef -notmatch '^[A-Za-z0-9][A-Za-z0-9._/-]*$' -or
              $baseRef.Contains('..') -or
              $baseRef.Contains('//') -or
              $baseRef.Contains('@{') -or
              $baseRef.EndsWith('/') -or
              $baseRef.EndsWith('.') -or
              $baseRef.EndsWith('.lock', [StringComparison]::OrdinalIgnoreCase)) {
            throw 'Manual base_ref must be a valid repository branch name.'
          }

          git check-ref-format --branch $baseRef *> $null
          if ($LASTEXITCODE -ne 0) {
            throw 'Manual base_ref failed Git branch validation.'
          }

          $remoteRef = "refs/remotes/origin/$baseRef"
          $refspec = "+refs/heads/${baseRef}:$remoteRef"
          git fetch --no-tags --depth=1 origin $refspec
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to fetch the validated comparison branch '$baseRef'."
          }

          $baseSha = (git rev-parse --verify "$remoteRef^{commit}").Trim().ToLowerInvariant()
          if ($baseSha -notmatch '^[0-9a-f]{40}$') {
            throw 'Resolved comparison base is not a commit SHA.'
          }

          "base_sha=$baseSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Release-candidate scope guard
        shell: pwsh
        env:
          BASE_SHA: ${{ steps.comparison.outputs.base_sha }}
        run: ./scripts/Test-AgentWorkbenchReleaseCandidateScope.ps1 -BaseRef $env:BASE_SHA

      - name: Encoding check
        shell: pwsh
        run: ./scripts/Test-TextEncoding.ps1

      - name: Diff whitespace check
        shell: pwsh
        env:
          BASE_SHA: ${{ steps.comparison.outputs.base_sha }}
        run: |
          git diff --check "$env:BASE_SHA...HEAD"
          if ($LASTEXITCODE -ne 0) {
            throw 'Whitespace validation failed for the pull-request change set.'
          }
